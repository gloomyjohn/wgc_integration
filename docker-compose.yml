version: '3.8'

services:
  # ========================= API 网关（核心入口）=========================
  gateway:
    build:
      context: ./wgc-python
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "9000:9000"  # Ngrok 暴露这个端口
    environment:
      - PYTHONUNBUFFERED=1
    command: python gateway.py 9000 0.0.0.0
    depends_on:
      python-engine:
        condition: service_healthy
      java-backend:
        condition: service_healthy
    networks:
      - wgc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ========================= Python 匹配引擎 (FastAPI) =========================
  python-engine:
    build: ./wgc-python
    container_name: python-engine
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    command: python matching_algorithm.py 8000 0.0.0.0
    networks:
      - wgc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ========================= Java Spring Boot 后端 =========================
  java-backend:
    build: ./wgc-backend
    container_name: java-backend
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      # 连接到本地（宿主机）的数据库
      # Windows/Mac 用户可以用 host.docker.internal
      # Linux 用户需要改为实际的宿主机 IP 或 172.17.0.1
      - SPRING_DATASOURCE_URL=jdbc:postgresql://host.docker.internal:5432/wgc_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_RABBITMQ_HOST=rabbitmq
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,metrics
      - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always
    networks:
      - wgc-network
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ========================= PostgreSQL 数据库 =========================
  db:
    image: pgrouting/pgrouting:15-3.5-3.8
#    image: postgis/postgis:15-3.3-alpine
    container_name: wgc-db
    environment:
      POSTGRES_DB: wgc_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - wgc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========================= Redis 缓存 =========================
  redis:
    image: redis:7-alpine
    container_name: wgc-redis
    ports:
      - "6379:6379"
    networks:
      - wgc-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========================= RabbitMQ 消息队列 =========================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: wgc-mq
    ports:
      - "5672:5672"      # AMQP 端口
      - "15672:15672"    # 管理界面
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - wgc-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

networks:
  wgc-network:
    driver: bridge

volumes:
  db_data: